<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本国憲法 電光掲示板</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="憲法電光掲示板">

<script>

  navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' });

<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    min-height: 100vh;
    font-family: 'Noto Sans JP', sans-serif;
    color: #eee;
  }

  /* ===== 設定画面 ===== */
  #settings {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 40px;
    overflow-y: auto;
  }

  #settings h1 {
    font-size: 20px;
    text-align: center;
    margin-bottom: 20px;
    color: #ffe600;
    text-shadow: 0 0 12px rgba(255,230,0,0.4);
  }

  .setting-group {
    margin-bottom: 18px;
  }

  .setting-group label.group-title {
    display: block;
    font-size: 14px;
    font-weight: 700;
    color: #aaa;
    margin-bottom: 6px;
  }

  /* ラジオ・ボタン風の選択肢 */
  .option-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .option-row label {
    flex: 1;
    min-width: 48px;
    text-align: center;
    padding: 8px 4px;
    border: 1px solid #444;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
  }

  .option-row input[type="radio"] { display: none; }
  .option-row input[type="radio"]:checked + span {
    /* handled by parent label */
  }
  .option-row label:has(input:checked) {
    background: #ffe600;
    color: #111;
    border-color: #ffe600;
    font-weight: 700;
  }

  /* 色選択 */
  .color-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .color-row label {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid transparent;
    transition: all 0.15s;
  }
  .color-row input[type="checkbox"] { display: none; }
  .color-row label {
    position: relative;
  }
  .color-row label:has(input:checked) {
    border-color: #fff;
    box-shadow: 0 0 8px rgba(255,255,255,0.6);
  }
  .color-row label:has(input:checked)::after {
    content: '✓';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: #111;
    text-shadow: 0 0 3px rgba(255,255,255,0.8);
  }

  /* 条文リスト */
  .article-list {
    max-height: 220px;
    overflow-y: auto;
    border: 1px solid #333;
    border-radius: 6px;
    padding: 6px;
    background: #0a0a0a;
  }

  .article-list label {
    display: block;
    padding: 5px 6px;
    font-size: 13px;
    cursor: pointer;
    border-radius: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .article-list label:hover {
    background: #222;
  }
  .article-list input[type="checkbox"] {
    margin-right: 6px;
    accent-color: #ffe600;
  }

  #btnRun {
    display: block;
    width: 100%;
    padding: 14px;
    margin-top: 20px;
    font-size: 18px;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    border: none;
    border-radius: 8px;
    background: #ffe600;
    color: #111;
    cursor: pointer;
    letter-spacing: 0.1em;
  }
  #btnRun:active {
    transform: scale(0.97);
  }

  /* ===== 再生画面 ===== */
  #player {
    display: none;
    width: 100%;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
  }

  .board-wrapper {
    width: 100%;
  }

  .board-title {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 48px;     /* ← タイトル文字サイズ */
    font-weight: 700;
    color: #ffe600;
    text-align: left;
    padding: 16px 0 8px;
    text-shadow: 0 0 12px rgba(255,230,0,0.5);
  }

  .board {
    width: 100%;
    background: #080808;
    border-top: 6px solid #222;
    border-bottom: 6px solid #222;
    box-shadow: 0 0 60px rgba(255,110,0,0.12), inset 0 0 40px rgba(0,0,0,0.9);
    overflow: hidden;
    position: relative;
    /* height is set dynamically based on font size */
  }

  .board::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent 0px, transparent 3px, rgba(0,0,0,0.15) 3px, rgba(0,0,0,0.15) 4px);
    pointer-events: none;
    z-index: 2;
  }

  #runner {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    display: flex;
    align-items: center;
    white-space: nowrap;
    will-change: transform;
  }

  .seg {
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    letter-spacing: 0.05em;
    display: inline-block;
    transform: scaleX(0.9);
    transform-origin: left center;
  }

  /* 戻るボタン */
  #btnBack {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 10;
    background: rgba(0,0,0,0.6);
    color: #aaa;
    border: 1px solid #555;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
  }
  #btnBack:hover, #btnPause:hover {
    color: #fff;
    border-color: #fff;
  }

  /* 縦書きON/OFFスライドトグル */
  .toggle-switch {
    position: relative;
    width: 44px;
    height: 24px;
    background: #555;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.2s;
    border: none;
    padding: 0;
    flex-shrink: 0;
  }
  .toggle-switch::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 20px;
    height: 20px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle-switch[data-on="true"] {
    background: #ffe600;
  }
  .toggle-switch[data-on="true"]::after {
    transform: translateX(20px);
  }

  /* 縦書きモード */
  #player.vertical {
    align-items: center;
    justify-content: center;
  }
  #player.vertical .board-wrapper {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #player.vertical .board-title {
    writing-mode: vertical-rl;
    position: fixed;
    top: 10px;
    z-index: 10;
    padding: 8px 0;
    /* left is set dynamically via JS */
  }
  #player.vertical #btnBack {
    writing-mode: vertical-rl;
    position: fixed;
    top: 10px;
    z-index: 10;
    padding: 10px 6px;
    letter-spacing: 0.1em;
    width: auto;
    /* right is set dynamically via JS */
  }
  #player.vertical #btnPause {
    position: fixed;
    z-index: 10;
    width: auto;
    /* right/top is set dynamically via JS */
  }
  #player.vertical .board {
    height: 100vh;
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    border-top: none;
    border-bottom: none;
    border-left: 6px solid #222;
    border-right: 6px solid #222;
  }
  #player.vertical #runner {
    position: absolute;
    top: 0;
    left: 0;
    writing-mode: vertical-rl;
    white-space: nowrap;
    width: 100%;
    height: auto;
    display: flex;
    align-items: center;
    will-change: transform;
  }
  #player.vertical .seg {
    transform: scaleY(0.9);
    transform-origin: center top;
    display: inline;
  }

  #btnPause {
    position: fixed;
    top: 10px;
    right: 130px;
    z-index: 10;
    background: rgba(0,0,0,0.6);
    color: #aaa;
    border: 1px solid #555;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 18px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    line-height: 1;
  }

  /* ===== PWAインストールバナー ===== */
  #installBanner {
    display: none;
    background: #1a2a1a;
    border: 1px solid #3a5a3a;
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 16px;
    align-items: center;
    gap: 10px;
  }
  #installBanner .install-text {
    flex: 1;
    font-size: 12px;
    color: #ccc;
    line-height: 1.5;
  }
  #installBanner .install-text strong {
    color: #ffe600;
    font-size: 13px;
  }
  #installBanner .install-btn {
    white-space: nowrap;
    background: #ffe600;
    color: #111;
    border: none;
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
  }
  #installBanner .install-btn:active {
    transform: scale(0.96);
  }
  #installBanner .install-close {
    background: none;
    border: none;
    color: #666;
    font-size: 18px;
    cursor: pointer;
    padding: 0 2px;
    line-height: 1;
  }
</style>
</head>

<script>
const ARTICLES = [{"id": "preamble-1", "label": "前文-1", "text": "日本国民は、正当に選挙された国会における代表者を通じて行動し、われらとわれらの子孫のために、諸国民との協和による成果と、わが国全土にわたつて自由のもたらす恵沢を確保し、政府の行為によつて再び戦争の惨禍が起ることのないやうにすることを決意し、ここに主権が国民に存することを宣言し、この憲法を確定する。そもそも国政は、国民の厳粛な信託によるものであつて、その権威は国民に由来し、その権力は国民の代表者がこれを行使し、その福利は国民がこれを享受する。これは人類普遍の原理であり、この憲法は、かかる原理に基くものである。われらは、これに反する一切の憲法、法令及び詔勅を排除する。", "checkbox_label": "前文-1:日本国民は、正当に選挙された国会における代表者を通じて行動し"}, {"id": "preamble-2", "label": "前文-2", "text": "日本国民は、恒久の平和を念願し、人間相互の関係を支配する崇高な理想を深く自覚するのであつて、平和を愛する諸国民の公正と信義に信頼して、われらの安全と生存を保持しようと決意した。われらは、平和を維持し、専制と隷従、圧迫と偏狭を地上から永遠に除去しようと努めてゐる国際社会において、名誉ある地位を占めたいと思ふ。われらは、全世界の国民が、ひとしく恐怖と欠乏から免かれ、平和のうちに生存する権利を有することを確認する。", "checkbox_label": "前文-2:日本国民は、恒久の平和を念願し、人間相互の関係を支配する崇高"}, {"id": "preamble-3", "label": "前文-3", "text": "われらは、いづれの国家も、自国のことのみに専念して他国を無視してはならないのであつて、政治道徳の法則は、普遍的なものであり、この法則に従ふことは、自国の主権を維持し、他国と対等関係に立たうとする各国の責務であると信ずる。", "checkbox_label": "前文-3:われらは、いづれの国家も、自国のことのみに専念して他国を無視"}, {"id": "preamble-4", "label": "前文-4", "text": "日本国民は、国家の名誉にかけ、全力をあげてこの崇高な理想と目的を達成することを誓ふ。", "checkbox_label": "前文-4:日本国民は、国家の名誉にかけ、全力をあげてこの崇高な理想と目"}, {"id": "1-0", "label": "001-0", "text": "第一条　天皇は、日本国の象徴であり日本国民統合の象徴であつて、この地位は、主権の存する日本国民の総意に基く。", "checkbox_label": "001-0:天皇は、日本国の象徴であり日本国民統合の象徴であつて、この地"}, {"id": "2-0", "label": "002-0", "text": "第二条　皇位は、世襲のものであつて、国会の議決した皇室典範の定めるところにより、これを継承する。", "checkbox_label": "002-0:皇位は、世襲のものであつて、国会の議決した皇室典範の定めると"}, {"id": "3-0", "label": "003-0", "text": "第三条　天皇の国事に関するすべての行為には、内閣の助言と承認を必要とし、内閣が、その責任を負ふ。", "checkbox_label": "003-0:天皇の国事に関するすべての行為には、内閣の助言と承認を必要と"}, {"id": "4-1", "label": "004-1", "text": "第四条　天皇は、この憲法の定める国事に関する行為のみを行ひ、国政に関する権能を有しない。", "checkbox_label": "004-1:天皇は、この憲法の定める国事に関する行為のみを行ひ、国政に関"}, {"id": "4-2", "label": "004-2", "text": "２　天皇は、法律の定めるところにより、その国事に関する行為を委任することができる。", "checkbox_label": "004-2:天皇は、法律の定めるところにより、その国事に関する行為を委任"}, {"id": "5-0", "label": "005-0", "text": "第五条　皇室典範の定めるところにより摂政を置くときは、摂政は、天皇の名でその国事に関する行為を行ふ。この場合には、前条第一項の規定を準用する。", "checkbox_label": "005-0:皇室典範の定めるところにより摂政を置くときは、摂政は、天皇の"}, {"id": "6-1", "label": "006-1", "text": "第六条　天皇は、国会の指名に基いて、内閣総理大臣を任命する。", "checkbox_label": "006-1:天皇は、国会の指名に基いて、内閣総理大臣を任命する。"}, {"id": "6-2", "label": "006-2", "text": "２　天皇は、内閣の指名に基いて、最高裁判所の長たる裁判官を任命する。", "checkbox_label": "006-2:天皇は、内閣の指名に基いて、最高裁判所の長たる裁判官を任命す"}, {"id": "7-0", "label": "007-0", "text": "第七条　天皇は、内閣の助言と承認により、国民のために、左の国事に関する行為を行ふ。一　憲法改正、法律、政令及び条約を公布すること。二　国会を召集すること。三　衆議院を解散すること。四　国会議員の総選挙の施行を公示すること。五　国務大臣及び法律の定めるその他の官吏の任免並びに全権委任状及び大使及び公使の信任状を認証すること。六　大赦、特赦、減刑、刑の執行の免除及び復権を認証すること。七　栄典を授与すること。八　批准書及び法律の定めるその他の外交文書を認証すること。九　外国の大使及び公使を接受すること。十　儀式を行ふこと。", "checkbox_label": "007-0:天皇は、内閣の助言と承認により、国民のために、左の国事に関す"}, {"id": "8-0", "label": "008-0", "text": "第八条　皇室に財産を譲り渡し、又は皇室が、財産を譲り受け、若しくは賜与することは、国会の議決に基かなければならない。", "checkbox_label": "008-0:皇室に財産を譲り渡し、又は皇室が、財産を譲り受け、若しくは賜"}, {"id": "9-1", "label": "009-1", "text": "第九条　日本国民は、正義と秩序を基調とする国際平和を誠実に希求し、国権の発動たる戦争と、武力による威嚇又は武力の行使は、国際紛争を解決する手段としては、永久にこれを放棄する。", "checkbox_label": "009-1:日本国民は、正義と秩序を基調とする国際平和を誠実に希求し、国"}, {"id": "9-2", "label": "009-2", "text": "２　前項の目的を達するため、陸海空軍その他の戦力は、これを保持しない。国の交戦権は、これを認めない。", "checkbox_label": "009-2:前項の目的を達するため、陸海空軍その他の戦力は、これを保持し"}, {"id": "10-0", "label": "010-0", "text": "第十条　日本国民たる要件は、法律でこれを定める。", "checkbox_label": "010-0:日本国民たる要件は、法律でこれを定める。"}, {"id": "11-0", "label": "011-0", "text": "第十一条　国民は、すべての基本的人権の享有を妨げられない。この憲法が国民に保障する基本的人権は、侵すことのできない永久の権利として、現在及び将来の国民に与へられる。", "checkbox_label": "011-0:国民は、すべての基本的人権の享有を妨げられない。この憲法が国"}, {"id": "12-0", "label": "012-0", "text": "第十二条　この憲法が国民に保障する自由及び権利は、国民の不断の努力によつて、これを保持しなければならない。又、国民は、これを濫用してはならないのであつて、常に公共の福祉のためにこれを利用する責任を負ふ。", "checkbox_label": "012-0:この憲法が国民に保障する自由及び権利は、国民の不断の努力によ"}, {"id": "13-0", "label": "013-0", "text": "第十三条　すべて国民は、個人として尊重される。生命、自由及び幸福追求に対する国民の権利については、公共の福祉に反しない限り、立法その他の国政の上で、最大の尊重を必要とする。", "checkbox_label": "013-0:すべて国民は、個人として尊重される。生命、自由及び幸福追求に"}, {"id": "14-1", "label": "014-1", "text": "第十四条　すべて国民は、法の下に平等であつて、人種、信条、性別、社会的身分又は門地により、政治的、経済的又は社会的関係において、差別されない。", "checkbox_label": "014-1:すべて国民は、法の下に平等であつて、人種、信条、性別、社会的"}, {"id": "14-2", "label": "014-2", "text": "２　華族その他の貴族の制度は、これを認めない。", "checkbox_label": "014-2:華族その他の貴族の制度は、これを認めない。"}, {"id": "14-3", "label": "014-3", "text": "３　栄誉、勲章その他の栄典の授与は、いかなる特権も伴はない。栄典の授与は、現にこれを有し、又は将来これを受ける者の一代に限り、その効力を有する。", "checkbox_label": "014-3:栄誉、勲章その他の栄典の授与は、いかなる特権も伴はない。栄典"}, {"id": "15-1", "label": "015-1", "text": "第十五条　公務員を選定し、及びこれを罷免することは、国民固有の権利である。", "checkbox_label": "015-1:公務員を選定し、及びこれを罷免することは、国民固有の権利であ"}, {"id": "15-2", "label": "015-2", "text": "２　すべて公務員は、全体の奉仕者であつて、一部の奉仕者ではない。", "checkbox_label": "015-2:すべて公務員は、全体の奉仕者であつて、一部の奉仕者ではない。"}, {"id": "15-3", "label": "015-3", "text": "３　公務員の選挙については、成年者による普通選挙を保障する。", "checkbox_label": "015-3:公務員の選挙については、成年者による普通選挙を保障する。"}, {"id": "15-4", "label": "015-4", "text": "４　すべて選挙における投票の秘密は、これを侵してはならない。選挙人は、その選択に関し公的にも私的にも責任を問はれない。", "checkbox_label": "015-4:すべて選挙における投票の秘密は、これを侵してはならない。選挙"}, {"id": "16-0", "label": "016-0", "text": "第十六条　何人も、損害の救済、公務員の罷免、法律、命令又は規則の制定、廃止又は改正その他の事項に関し、平穏に請願する権利を有し、何人も、かかる請願をしたためにいかなる差別待遇も受けない。", "checkbox_label": "016-0:何人も、損害の救済、公務員の罷免、法律、命令又は規則の制定、"}, {"id": "17-0", "label": "017-0", "text": "第十七条　何人も、公務員の不法行為により、損害を受けたときは、法律の定めるところにより、国又は公共団体に、その賠償を求めることができる。", "checkbox_label": "017-0:何人も、公務員の不法行為により、損害を受けたときは、法律の定"}, {"id": "18-0", "label": "018-0", "text": "第十八条　何人も、いかなる奴隷的拘束も受けない。又、犯罪に因る処罰の場合を除いては、その意に反する苦役に服させられない。", "checkbox_label": "018-0:何人も、いかなる奴隷的拘束も受けない。又、犯罪に因る処罰の場"}, {"id": "19-0", "label": "019-0", "text": "第十九条　思想及び良心の自由は、これを侵してはならない。", "checkbox_label": "019-0:思想及び良心の自由は、これを侵してはならない。"}, {"id": "20-1", "label": "020-1", "text": "第二十条　信教の自由は、何人に対してもこれを保障する。いかなる宗教団体も、国から特権を受け、又は政治上の権力を行使してはならない。", "checkbox_label": "020-1:信教の自由は、何人に対してもこれを保障する。いかなる宗教団体"}, {"id": "20-2", "label": "020-2", "text": "２　何人も、宗教上の行為、祝典、儀式又は行事に参加することを強制されない。", "checkbox_label": "020-2:何人も、宗教上の行為、祝典、儀式又は行事に参加することを強制"}, {"id": "20-3", "label": "020-3", "text": "３　国及びその機関は、宗教教育その他いかなる宗教的活動もしてはならない。", "checkbox_label": "020-3:国及びその機関は、宗教教育その他いかなる宗教的活動もしてはな"}, {"id": "21-1", "label": "021-1", "text": "第二十一条　集会、結社及び言論、出版その他一切の表現の自由は、これを保障する。", "checkbox_label": "021-1:集会、結社及び言論、出版その他一切の表現の自由は、これを保障"}, {"id": "21-2", "label": "021-2", "text": "２　検閲は、これをしてはならない。通信の秘密は、これを侵してはならない。", "checkbox_label": "021-2:検閲は、これをしてはならない。通信の秘密は、これを侵してはな"}, {"id": "22-1", "label": "022-1", "text": "第二十二条　何人も、公共の福祉に反しない限り、居住、移転及び職業選択の自由を有する。", "checkbox_label": "022-1:何人も、公共の福祉に反しない限り、居住、移転及び職業選択の自"}, {"id": "22-2", "label": "022-2", "text": "２　何人も、外国に移住し、又は国籍を離脱する自由を侵されない。", "checkbox_label": "022-2:何人も、外国に移住し、又は国籍を離脱する自由を侵されない。"}, {"id": "23-0", "label": "023-0", "text": "第二十三条　学問の自由は、これを保障する。", "checkbox_label": "023-0:学問の自由は、これを保障する。"}, {"id": "24-1", "label": "024-1", "text": "第二十四条　婚姻は、両性の合意のみに基いて成立し、夫婦が同等の権利を有することを基本として、相互の協力により、維持されなければならない。", "checkbox_label": "024-1:婚姻は、両性の合意のみに基いて成立し、夫婦が同等の権利を有す"}, {"id": "24-2", "label": "024-2", "text": "２　配偶者の選択、財産権、相続、住居の選定、離婚並びに婚姻及び家族に関するその他の事項に関しては、法律は、個人の尊厳と両性の本質的平等に立脚して、制定されなければならない。", "checkbox_label": "024-2:配偶者の選択、財産権、相続、住居の選定、離婚並びに婚姻及び家"}, {"id": "25-1", "label": "025-1", "text": "第二十五条　すべて国民は、健康で文化的な最低限度の生活を営む権利を有する。", "checkbox_label": "025-1:すべて国民は、健康で文化的な最低限度の生活を営む権利を有する"}, {"id": "25-2", "label": "025-2", "text": "２　国は、すべての生活部面について、社会福祉、社会保障及び公衆衛生の向上及び増進に努めなければならない。", "checkbox_label": "025-2:国は、すべての生活部面について、社会福祉、社会保障及び公衆衛"}, {"id": "26-1", "label": "026-1", "text": "第二十六条　すべて国民は、法律の定めるところにより、その能力に応じて、ひとしく教育を受ける権利を有する。", "checkbox_label": "026-1:すべて国民は、法律の定めるところにより、その能力に応じて、ひ"}, {"id": "26-2", "label": "026-2", "text": "２　すべて国民は、法律の定めるところにより、その保護する子女に普通教育を受けさせる義務を負ふ。義務教育は、これを無償とする。", "checkbox_label": "026-2:すべて国民は、法律の定めるところにより、その保護する子女に普"}, {"id": "27-1", "label": "027-1", "text": "第二十七条　すべて国民は、勤労の権利を有し、義務を負ふ。", "checkbox_label": "027-1:すべて国民は、勤労の権利を有し、義務を負ふ。"}, {"id": "27-2", "label": "027-2", "text": "２　賃金、就業時間、休息その他の勤労条件に関する基準は、法律でこれを定める。", "checkbox_label": "027-2:賃金、就業時間、休息その他の勤労条件に関する基準は、法律でこ"}, {"id": "27-3", "label": "027-3", "text": "３　児童は、これを酷使してはならない。", "checkbox_label": "027-3:児童は、これを酷使してはならない。"}, {"id": "28-0", "label": "028-0", "text": "第二十八条　勤労者の団結する権利及び団体交渉その他の団体行動をする権利は、これを保障する。", "checkbox_label": "028-0:勤労者の団結する権利及び団体交渉その他の団体行動をする権利は"}, {"id": "29-1", "label": "029-1", "text": "第二十九条　財産権は、これを侵してはならない。", "checkbox_label": "029-1:財産権は、これを侵してはならない。"}, {"id": "29-2", "label": "029-2", "text": "２　財産権の内容は、公共の福祉に適合するやうに、法律でこれを定める。", "checkbox_label": "029-2:財産権の内容は、公共の福祉に適合するやうに、法律でこれを定め"}, {"id": "29-3", "label": "029-3", "text": "３　私有財産は、正当な補償の下に、これを公共のために用ひることができる。", "checkbox_label": "029-3:私有財産は、正当な補償の下に、これを公共のために用ひることが"}, {"id": "30-0", "label": "030-0", "text": "第三十条　国民は、法律の定めるところにより、納税の義務を負ふ。", "checkbox_label": "030-0:国民は、法律の定めるところにより、納税の義務を負ふ。"}, {"id": "31-0", "label": "031-0", "text": "第三十一条　何人も、法律の定める手続によらなければ、その生命若しくは自由を奪はれ、又はその他の刑罰を科せられない。", "checkbox_label": "031-0:何人も、法律の定める手続によらなければ、その生命若しくは自由"}, {"id": "32-0", "label": "032-0", "text": "第三十二条　何人も、裁判所において裁判を受ける権利を奪はれない。", "checkbox_label": "032-0:何人も、裁判所において裁判を受ける権利を奪はれない。"}, {"id": "33-0", "label": "033-0", "text": "第三十三条　何人も、現行犯として逮捕される場合を除いては、権限を有する司法官憲が発し、且つ理由となつてゐる犯罪を明示する令状によらなければ、逮捕されない。", "checkbox_label": "033-0:何人も、現行犯として逮捕される場合を除いては、権限を有する司"}, {"id": "34-0", "label": "034-0", "text": "第三十四条　何人も、理由を直ちに告げられ、且つ、直ちに弁護人に依頼する権利を与へられなければ、抑留又は拘禁されない。又、何人も、正当な理由がなければ、拘禁されず、要求があれば、その理由は、直ちに本人及びその弁護人の出席する公開の法廷で示されなければならない。", "checkbox_label": "034-0:何人も、理由を直ちに告げられ、且つ、直ちに弁護人に依頼する権"}, {"id": "35-1", "label": "035-1", "text": "第三十五条　何人も、その住居、書類及び所持品について、侵入、捜索及び押収を受けることのない権利は、第三十三条の場合を除いては、正当な理由に基いて発せられ、且つ捜索する場所及び押収する物を明示する令状がなければ、侵されない。", "checkbox_label": "035-1:何人も、その住居、書類及び所持品について、侵入、捜索及び押収"}, {"id": "35-2", "label": "035-2", "text": "２　捜索又は押収は、権限を有する司法官憲が発する各別の令状により、これを行ふ。", "checkbox_label": "035-2:捜索又は押収は、権限を有する司法官憲が発する各別の令状により"}, {"id": "36-0", "label": "036-0", "text": "第三十六条　公務員による拷問及び残虐な刑罰は、絶対にこれを禁ずる。", "checkbox_label": "036-0:公務員による拷問及び残虐な刑罰は、絶対にこれを禁ずる。"}, {"id": "37-1", "label": "037-1", "text": "第三十七条　すべて刑事事件においては、被告人は、公平な裁判所の迅速な公開裁判を受ける権利を有する。", "checkbox_label": "037-1:すべて刑事事件においては、被告人は、公平な裁判所の迅速な公開"}, {"id": "37-2", "label": "037-2", "text": "２　刑事被告人は、すべての証人に対して審問する機会を充分に与へられ、又、公費で自己のために強制的手続により証人を求める権利を有する。", "checkbox_label": "037-2:刑事被告人は、すべての証人に対して審問する機会を充分に与へら"}, {"id": "37-3", "label": "037-3", "text": "３　刑事被告人は、いかなる場合にも、資格を有する弁護人を依頼することができる。被告人が自らこれを依頼することができないときは、国でこれを附する。", "checkbox_label": "037-3:刑事被告人は、いかなる場合にも、資格を有する弁護人を依頼する"}, {"id": "38-1", "label": "038-1", "text": "第三十八条　何人も、自己に不利益な供述を強要されない。", "checkbox_label": "038-1:何人も、自己に不利益な供述を強要されない。"}, {"id": "38-2", "label": "038-2", "text": "２　強制、拷問若しくは脅迫による自白又は不当に長く抑留若しくは拘禁された後の自白は、これを証拠とすることができない。", "checkbox_label": "038-2:強制、拷問若しくは脅迫による自白又は不当に長く抑留若しくは拘"}, {"id": "38-3", "label": "038-3", "text": "３　何人も、自己に不利益な唯一の証拠が本人の自白である場合には、有罪とされ、又は刑罰を科せられない。", "checkbox_label": "038-3:何人も、自己に不利益な唯一の証拠が本人の自白である場合には、"}, {"id": "39-0", "label": "039-0", "text": "第三十九条　何人も、実行の時に適法であつた行為又は既に無罪とされた行為については、刑事上の責任を問はれない。又、同一の犯罪について、重ねて刑事上の責任を問はれない。", "checkbox_label": "039-0:何人も、実行の時に適法であつた行為又は既に無罪とされた行為に"}, {"id": "40-0", "label": "040-0", "text": "第四十条　何人も、抑留又は拘禁された後、無罪の裁判を受けたときは、法律の定めるところにより、国にその補償を求めることができる。", "checkbox_label": "040-0:何人も、抑留又は拘禁された後、無罪の裁判を受けたときは、法律"}, {"id": "41-0", "label": "041-0", "text": "第四十一条　国会は、国権の最高機関であつて、国の唯一の立法機関である。", "checkbox_label": "041-0:国会は、国権の最高機関であつて、国の唯一の立法機関である。"}, {"id": "42-0", "label": "042-0", "text": "第四十二条　国会は、衆議院及び参議院の両議院でこれを構成する。", "checkbox_label": "042-0:国会は、衆議院及び参議院の両議院でこれを構成する。"}, {"id": "43-1", "label": "043-1", "text": "第四十三条　両議院は、全国民を代表する選挙された議員でこれを組織する。", "checkbox_label": "043-1:両議院は、全国民を代表する選挙された議員でこれを組織する。"}, {"id": "43-2", "label": "043-2", "text": "２　両議院の議員の定数は、法律でこれを定める。", "checkbox_label": "043-2:両議院の議員の定数は、法律でこれを定める。"}, {"id": "44-0", "label": "044-0", "text": "第四十四条　両議院の議員及びその選挙人の資格は、法律でこれを定める。但し、人種、信条、性別、社会的身分、門地、教育、財産又は収入によつて差別してはならない。", "checkbox_label": "044-0:両議院の議員及びその選挙人の資格は、法律でこれを定める。但し"}, {"id": "45-0", "label": "045-0", "text": "第四十五条　衆議院議員の任期は、四年とする。但し、衆議院解散の場合には、その期間満了前に終了する。", "checkbox_label": "045-0:衆議院議員の任期は、四年とする。但し、衆議院解散の場合には、"}, {"id": "46-0", "label": "046-0", "text": "第四十六条　参議院議員の任期は、六年とし、三年ごとに議員の半数を改選する。", "checkbox_label": "046-0:参議院議員の任期は、六年とし、三年ごとに議員の半数を改選する"}, {"id": "47-0", "label": "047-0", "text": "第四十七条　選挙区、投票の方法その他両議院の議員の選挙に関する事項は、法律でこれを定める。", "checkbox_label": "047-0:選挙区、投票の方法その他両議院の議員の選挙に関する事項は、法"}, {"id": "48-0", "label": "048-0", "text": "第四十八条　何人も、同時に両議院の議員たることはできない。", "checkbox_label": "048-0:何人も、同時に両議院の議員たることはできない。"}, {"id": "49-0", "label": "049-0", "text": "第四十九条　両議院の議員は、法律の定めるところにより、国庫から相当額の歳費を受ける。", "checkbox_label": "049-0:両議院の議員は、法律の定めるところにより、国庫から相当額の歳"}, {"id": "50-0", "label": "050-0", "text": "第五十条　両議院の議員は、法律の定める場合を除いては、国会の会期中逮捕されず、会期前に逮捕された議員は、その議院の要求があれば、会期中これを釈放しなければならない。", "checkbox_label": "050-0:両議院の議員は、法律の定める場合を除いては、国会の会期中逮捕"}, {"id": "51-0", "label": "051-0", "text": "第五十一条　両議院の議員は、議院で行つた演説、討論又は表決について、院外で責任を問はれない。", "checkbox_label": "051-0:両議院の議員は、議院で行つた演説、討論又は表決について、院外"}, {"id": "52-0", "label": "052-0", "text": "第五十二条　国会の常会は、毎年一回これを召集する。", "checkbox_label": "052-0:国会の常会は、毎年一回これを召集する。"}, {"id": "53-0", "label": "053-0", "text": "第五十三条　内閣は、国会の臨時会の召集を決定することができる。いづれかの議院の総議員の四分の一以上の要求があれば、内閣は、その召集を決定しなければならない。", "checkbox_label": "053-0:内閣は、国会の臨時会の召集を決定することができる。いづれかの"}, {"id": "54-1", "label": "054-1", "text": "第五十四条　衆議院が解散されたときは、解散の日から四十日以内に、衆議院議員の総選挙を行ひ、その選挙の日から三十日以内に、国会を召集しなければならない。", "checkbox_label": "054-1:衆議院が解散されたときは、解散の日から四十日以内に、衆議院議"}, {"id": "54-2", "label": "054-2", "text": "２　衆議院が解散されたときは、参議院は、同時に閉会となる。但し、内閣は、国に緊急の必要があるときは、参議院の緊急集会を求めることができる。", "checkbox_label": "054-2:衆議院が解散されたときは、参議院は、同時に閉会となる。但し、"}, {"id": "54-3", "label": "054-3", "text": "３　前項但書の緊急集会において採られた措置は、臨時のものであつて、次の国会開会の後十日以内に、衆議院の同意がない場合には、その効力を失ふ。", "checkbox_label": "054-3:前項但書の緊急集会において採られた措置は、臨時のものであつて"}, {"id": "55-0", "label": "055-0", "text": "第五十五条　両議院は、各々その議員の資格に関する争訟を裁判する。但し、議員の議席を失はせるには、出席議員の三分の二以上の多数による議決を必要とする。", "checkbox_label": "055-0:両議院は、各々その議員の資格に関する争訟を裁判する。但し、議"}, {"id": "56-1", "label": "056-1", "text": "第五十六条　両議院は、各々その総議員の三分の一以上の出席がなければ、議事を開き議決することができない。", "checkbox_label": "056-1:両議院は、各々その総議員の三分の一以上の出席がなければ、議事"}, {"id": "56-2", "label": "056-2", "text": "２　両議院の議事は、この憲法に特別の定のある場合を除いては、出席議員の過半数でこれを決し、可否同数のときは、議長の決するところによる。", "checkbox_label": "056-2:両議院の議事は、この憲法に特別の定のある場合を除いては、出席"}, {"id": "57-1", "label": "057-1", "text": "第五十七条　両議院の会議は、公開とする。但し、出席議員の三分の二以上の多数で議決したときは、秘密会を開くことができる。", "checkbox_label": "057-1:両議院の会議は、公開とする。但し、出席議員の三分の二以上の多"}, {"id": "57-2", "label": "057-2", "text": "２　両議院は、各々その会議の記録を保存し、秘密会の記録の中で特に秘密を要すると認められるもの以外は、これを公表し、且つ一般に頒布しなければならない。", "checkbox_label": "057-2:両議院は、各々その会議の記録を保存し、秘密会の記録の中で特に"}, {"id": "57-3", "label": "057-3", "text": "３　出席議員の五分の一以上の要求があれば、各議員の表決は、これを会議録に記載しなければならない。", "checkbox_label": "057-3:出席議員の五分の一以上の要求があれば、各議員の表決は、これを"}, {"id": "58-1", "label": "058-1", "text": "第五十八条　両議院は、各々その議長その他の役員を選任する。", "checkbox_label": "058-1:両議院は、各々その議長その他の役員を選任する。"}, {"id": "58-2", "label": "058-2", "text": "２　両議院は、各々その会議その他の手続及び内部の規律に関する規則を定め、又、院内の秩序をみだした議員を懲罰することができる。但し、議員を除名するには、出席議員の三分の二以上の多数による議決を必要とする。", "checkbox_label": "058-2:両議院は、各々その会議その他の手続及び内部の規律に関する規則"}, {"id": "59-1", "label": "059-1", "text": "第五十九条　法律案は、この憲法に特別の定のある場合を除いては、両議院で可決したとき法律となる。", "checkbox_label": "059-1:法律案は、この憲法に特別の定のある場合を除いては、両議院で可"}, {"id": "59-2", "label": "059-2", "text": "２　衆議院で可決し、参議院でこれと異なつた議決をした法律案は、衆議院で出席議員の三分の二以上の多数で再び可決したときは、法律となる。", "checkbox_label": "059-2:衆議院で可決し、参議院でこれと異なつた議決をした法律案は、衆"}, {"id": "59-3", "label": "059-3", "text": "３　前項の規定は、法律の定めるところにより、衆議院が、両議院の協議会を開くことを求めることを妨げない。", "checkbox_label": "059-3:前項の規定は、法律の定めるところにより、衆議院が、両議院の協"}, {"id": "59-4", "label": "059-4", "text": "４　参議院が、衆議院の可決した法律案を受け取つた後、国会休会中の期間を除いて六十日以内に、議決しないときは、衆議院は、参議院がその法律案を否決したものとみなすことができる。", "checkbox_label": "059-4:参議院が、衆議院の可決した法律案を受け取つた後、国会休会中の"}, {"id": "60-1", "label": "060-1", "text": "第六十条　予算は、さきに衆議院に提出しなければならない。", "checkbox_label": "060-1:予算は、さきに衆議院に提出しなければならない。"}, {"id": "60-2", "label": "060-2", "text": "２　予算について、参議院で衆議院と異なつた議決をした場合に、法律の定めるところにより、両議院の協議会を開いても意見が一致しないとき、又は参議院が、衆議院の可決した予算を受け取つた後、国会休会中の期間を除いて三十日以内に、議決しないときは、衆議院の議決を国会の議決とする。", "checkbox_label": "060-2:予算について、参議院で衆議院と異なつた議決をした場合に、法律"}, {"id": "61-0", "label": "061-0", "text": "第六十一条　条約の締結に必要な国会の承認については、前条第二項の規定を準用する。", "checkbox_label": "061-0:条約の締結に必要な国会の承認については、前条第二項の規定を準"}, {"id": "62-0", "label": "062-0", "text": "第六十二条　両議院は、各々国政に関する調査を行ひ、これに関して、証人の出頭及び証言並びに記録の提出を要求することができる。", "checkbox_label": "062-0:両議院は、各々国政に関する調査を行ひ、これに関して、証人の出"}, {"id": "63-0", "label": "063-0", "text": "第六十三条　内閣総理大臣その他の国務大臣は、両議院の一に議席を有すると有しないとにかかはらず、何時でも議案について発言するため議院に出席することができる。又、答弁又は説明のため出席を求められたときは、出席しなければならない。", "checkbox_label": "063-0:内閣総理大臣その他の国務大臣は、両議院の一に議席を有すると有"}, {"id": "64-1", "label": "064-1", "text": "第六十四条　国会は、罷免の訴追を受けた裁判官を裁判するため、両議院の議員で組織する弾劾裁判所を設ける。", "checkbox_label": "064-1:国会は、罷免の訴追を受けた裁判官を裁判するため、両議院の議員"}, {"id": "64-2", "label": "064-2", "text": "２　弾劾に関する事項は、法律でこれを定める。", "checkbox_label": "064-2:弾劾に関する事項は、法律でこれを定める。"}, {"id": "65-0", "label": "065-0", "text": "第六十五条　行政権は、内閣に属する。", "checkbox_label": "065-0:行政権は、内閣に属する。"}, {"id": "66-1", "label": "066-1", "text": "第六十六条　内閣は、法律の定めるところにより、その首長たる内閣総理大臣及びその他の国務大臣でこれを組織する。", "checkbox_label": "066-1:内閣は、法律の定めるところにより、その首長たる内閣総理大臣及"}, {"id": "66-2", "label": "066-2", "text": "２　内閣総理大臣その他の国務大臣は、文民でなければならない。", "checkbox_label": "066-2:内閣総理大臣その他の国務大臣は、文民でなければならない。"}, {"id": "66-3", "label": "066-3", "text": "３　内閣は、行政権の行使について、国会に対し連帯して責任を負ふ。", "checkbox_label": "066-3:内閣は、行政権の行使について、国会に対し連帯して責任を負ふ。"}, {"id": "67-1", "label": "067-1", "text": "第六十七条　内閣総理大臣は、国会議員の中から国会の議決で、これを指名する。この指名は、他のすべての案件に先だつて、これを行ふ。", "checkbox_label": "067-1:内閣総理大臣は、国会議員の中から国会の議決で、これを指名する"}, {"id": "67-2", "label": "067-2", "text": "２　衆議院と参議院とが異なつた指名の議決をした場合に、法律の定めるところにより、両議院の協議会を開いても意見が一致しないとき、又は衆議院が指名の議決をした後、国会休会中の期間を除いて十日以内に、参議院が、指名の議決をしないときは、衆議院の議決を国会の議決とする。", "checkbox_label": "067-2:衆議院と参議院とが異なつた指名の議決をした場合に、法律の定め"}, {"id": "68-1", "label": "068-1", "text": "第六十八条　内閣総理大臣は、国務大臣を任命する。但し、その過半数は、国会議員の中から選ばれなければならない。", "checkbox_label": "068-1:内閣総理大臣は、国務大臣を任命する。但し、その過半数は、国会"}, {"id": "68-2", "label": "068-2", "text": "２　内閣総理大臣は、任意に国務大臣を罷免することができる。", "checkbox_label": "068-2:内閣総理大臣は、任意に国務大臣を罷免することができる。"}, {"id": "69-0", "label": "069-0", "text": "第六十九条　内閣は、衆議院で不信任の決議案を可決し、又は信任の決議案を否決したときは、十日以内に衆議院が解散されない限り、総辞職をしなければならない。", "checkbox_label": "069-0:内閣は、衆議院で不信任の決議案を可決し、又は信任の決議案を否"}, {"id": "70-0", "label": "070-0", "text": "第七十条　内閣総理大臣が欠けたとき、又は衆議院議員総選挙の後に初めて国会の召集があつたときは、内閣は、総辞職をしなければならない。", "checkbox_label": "070-0:内閣総理大臣が欠けたとき、又は衆議院議員総選挙の後に初めて国"}, {"id": "71-0", "label": "071-0", "text": "第七十一条　前二条の場合には、内閣は、あらたに内閣総理大臣が任命されるまで引き続きその職務を行ふ。", "checkbox_label": "071-0:前二条の場合には、内閣は、あらたに内閣総理大臣が任命されるま"}, {"id": "72-0", "label": "072-0", "text": "第七十二条　内閣総理大臣は、内閣を代表して議案を国会に提出し、一般国務及び外交関係について国会に報告し、並びに行政各部を指揮監督する。", "checkbox_label": "072-0:内閣総理大臣は、内閣を代表して議案を国会に提出し、一般国務及"}, {"id": "73-0", "label": "073-0", "text": "第七十三条　内閣は、他の一般行政事務の外、左の事務を行ふ。一　法律を誠実に執行し、国務を総理すること。二　外交関係を処理すること。三　条約を締結すること。但し、事前に、時宜によつては事後に、国会の承認を経ることを必要とする。四　法律の定める基準に従ひ、官吏に関する事務を掌理すること。五　予算を作成して国会に提出すること。六　この憲法及び法律の規定を実施するために、政令を制定すること。但し、政令には、特にその法律の委任がある場合を除いては、罰則を設けることができない。七　大赦、特赦、減刑、刑の執行の免除及び復権を決定すること。", "checkbox_label": "073-0:内閣は、他の一般行政事務の外、左の事務を行ふ。一　法律を誠実"}, {"id": "74-0", "label": "074-0", "text": "第七十四条　法律及び政令には、すべて主任の国務大臣が署名し、内閣総理大臣が連署することを必要とする。", "checkbox_label": "074-0:法律及び政令には、すべて主任の国務大臣が署名し、内閣総理大臣"}, {"id": "75-0", "label": "075-0", "text": "第七十五条　国務大臣は、その在任中、内閣総理大臣の同意がなければ、訴追されない。但し、これがため、訴追の権利は、害されない。", "checkbox_label": "075-0:国務大臣は、その在任中、内閣総理大臣の同意がなければ、訴追さ"}, {"id": "76-1", "label": "076-1", "text": "第七十六条　すべて司法権は、最高裁判所及び法律の定めるところにより設置する下級裁判所に属する。", "checkbox_label": "076-1:すべて司法権は、最高裁判所及び法律の定めるところにより設置す"}, {"id": "76-2", "label": "076-2", "text": "２　特別裁判所は、これを設置することができない。行政機関は、終審として裁判を行ふことができない。", "checkbox_label": "076-2:特別裁判所は、これを設置することができない。行政機関は、終審"}, {"id": "76-3", "label": "076-3", "text": "３　すべて裁判官は、その良心に従ひ独立してその職権を行ひ、この憲法及び法律にのみ拘束される。", "checkbox_label": "076-3:すべて裁判官は、その良心に従ひ独立してその職権を行ひ、この憲"}, {"id": "77-1", "label": "077-1", "text": "第七十七条　最高裁判所は、訴訟に関する手続、弁護士、裁判所の内部規律及び司法事務処理に関する事項について、規則を定める権限を有する。", "checkbox_label": "077-1:最高裁判所は、訴訟に関する手続、弁護士、裁判所の内部規律及び"}, {"id": "77-2", "label": "077-2", "text": "２　検察官は、最高裁判所の定める規則に従はなければならない。", "checkbox_label": "077-2:検察官は、最高裁判所の定める規則に従はなければならない。"}, {"id": "77-3", "label": "077-3", "text": "３　最高裁判所は、下級裁判所に関する規則を定める権限を、下級裁判所に委任することができる。", "checkbox_label": "077-3:最高裁判所は、下級裁判所に関する規則を定める権限を、下級裁判"}, {"id": "78-0", "label": "078-0", "text": "第七十八条　裁判官は、裁判により、心身の故障のために職務を執ることができないと決定された場合を除いては、公の弾劾によらなければ罷免されない。裁判官の懲戒処分は、行政機関がこれを行ふことはできない。", "checkbox_label": "078-0:裁判官は、裁判により、心身の故障のために職務を執ることができ"}, {"id": "79-1", "label": "079-1", "text": "第七十九条　最高裁判所は、その長たる裁判官及び法律の定める員数のその他の裁判官でこれを構成し、その長たる裁判官以外の裁判官は、内閣でこれを任命する。", "checkbox_label": "079-1:最高裁判所は、その長たる裁判官及び法律の定める員数のその他の"}, {"id": "79-2", "label": "079-2", "text": "２　最高裁判所の裁判官の任命は、その任命後初めて行はれる衆議院議員総選挙の際国民の審査に付し、その後十年を経過した後初めて行はれる衆議院議員総選挙の際更に審査に付し、その後も同様とする。", "checkbox_label": "079-2:最高裁判所の裁判官の任命は、その任命後初めて行はれる衆議院議"}, {"id": "79-3", "label": "079-3", "text": "３　前項の場合において、投票者の多数が裁判官の罷免を可とするときは、その裁判官は、罷免される。", "checkbox_label": "079-3:前項の場合において、投票者の多数が裁判官の罷免を可とするとき"}, {"id": "79-4", "label": "079-4", "text": "４　審査に関する事項は、法律でこれを定める。", "checkbox_label": "079-4:審査に関する事項は、法律でこれを定める。"}, {"id": "79-5", "label": "079-5", "text": "５　最高裁判所の裁判官は、法律の定める年齢に達した時に退官する。", "checkbox_label": "079-5:最高裁判所の裁判官は、法律の定める年齢に達した時に退官する。"}, {"id": "79-6", "label": "079-6", "text": "６　最高裁判所の裁判官は、すべて定期に相当額の報酬を受ける。この報酬は、在任中、これを減額することができない。", "checkbox_label": "079-6:最高裁判所の裁判官は、すべて定期に相当額の報酬を受ける。この"}, {"id": "80-1", "label": "080-1", "text": "第八十条　下級裁判所の裁判官は、最高裁判所の指名した者の名簿によつて、内閣でこれを任命する。その裁判官は、任期を十年とし、再任されることができる。但し、法律の定める年齢に達した時には退官する。", "checkbox_label": "080-1:下級裁判所の裁判官は、最高裁判所の指名した者の名簿によつて、"}, {"id": "80-2", "label": "080-2", "text": "２　下級裁判所の裁判官は、すべて定期に相当額の報酬を受ける。この報酬は、在任中、これを減額することができない。", "checkbox_label": "080-2:下級裁判所の裁判官は、すべて定期に相当額の報酬を受ける。この"}, {"id": "81-0", "label": "081-0", "text": "第八十一条　最高裁判所は、一切の法律、命令、規則又は処分が憲法に適合するかしないかを決定する権限を有する終審裁判所である。", "checkbox_label": "081-0:最高裁判所は、一切の法律、命令、規則又は処分が憲法に適合する"}, {"id": "82-1", "label": "082-1", "text": "第八十二条　裁判の対審及び判決は、公開法廷でこれを行ふ。", "checkbox_label": "082-1:裁判の対審及び判決は、公開法廷でこれを行ふ。"}, {"id": "82-2", "label": "082-2", "text": "２　裁判所が、裁判官の全員一致で、公の秩序又は善良の風俗を害する虞があると決した場合には、対審は、公開しないでこれを行ふことができる。但し、政治犯罪、出版に関する犯罪又はこの憲法第三章で保障する国民の権利が問題となつてゐる事件の対審は、常にこれを公開しなければならない。", "checkbox_label": "082-2:裁判所が、裁判官の全員一致で、公の秩序又は善良の風俗を害する"}, {"id": "83-0", "label": "083-0", "text": "第八十三条　国の財政を処理する権限は、国会の議決に基いて、これを行使しなければならない。", "checkbox_label": "083-0:国の財政を処理する権限は、国会の議決に基いて、これを行使しな"}, {"id": "84-0", "label": "084-0", "text": "第八十四条　あらたに租税を課し、又は現行の租税を変更するには、法律又は法律の定める条件によることを必要とする。", "checkbox_label": "084-0:あらたに租税を課し、又は現行の租税を変更するには、法律又は法"}, {"id": "85-0", "label": "085-0", "text": "第八十五条　国費を支出し、又は国が債務を負担するには、国会の議決に基くことを必要とする。", "checkbox_label": "085-0:国費を支出し、又は国が債務を負担するには、国会の議決に基くこ"}, {"id": "86-0", "label": "086-0", "text": "第八十六条　内閣は、毎会計年度の予算を作成し、国会に提出して、その審議を受け議決を経なければならない。", "checkbox_label": "086-0:内閣は、毎会計年度の予算を作成し、国会に提出して、その審議を"}, {"id": "87-1", "label": "087-1", "text": "第八十七条　予見し難い予算の不足に充てるため、国会の議決に基いて予備費を設け、内閣の責任でこれを支出することができる。", "checkbox_label": "087-1:予見し難い予算の不足に充てるため、国会の議決に基いて予備費を"}, {"id": "87-2", "label": "087-2", "text": "２　すべて予備費の支出については、内閣は、事後に国会の承諾を得なければならない。", "checkbox_label": "087-2:すべて予備費の支出については、内閣は、事後に国会の承諾を得な"}, {"id": "88-0", "label": "088-0", "text": "第八十八条　すべて皇室財産は、国に属する。すべて皇室の費用は、予算に計上して国会の議決を経なければならない。", "checkbox_label": "088-0:すべて皇室財産は、国に属する。すべて皇室の費用は、予算に計上"}, {"id": "89-0", "label": "089-0", "text": "第八十九条　公金その他の公の財産は、宗教上の組織若しくは団体の使用、便益若しくは維持のため、又は公の支配に属しない慈善、教育若しくは博愛の事業に対し、これを支出し、又はその利用に供してはならない。", "checkbox_label": "089-0:公金その他の公の財産は、宗教上の組織若しくは団体の使用、便益"}, {"id": "90-1", "label": "090-1", "text": "第九十条　国の収入支出の決算は、すべて毎年会計検査院がこれを検査し、内閣は、次の年度に、その検査報告とともに、これを国会に提出しなければならない。", "checkbox_label": "090-1:国の収入支出の決算は、すべて毎年会計検査院がこれを検査し、内"}, {"id": "90-2", "label": "090-2", "text": "２　会計検査院の組織及び権限は、法律でこれを定める。", "checkbox_label": "090-2:会計検査院の組織及び権限 他の公務員は、この憲法を尊重し擁護する義務を負ふ。", "checkbox_label": "099-0:天皇又は摂政及び国務大臣、国会議員、裁判官その他の公務員は、"}, {"id": "100-1", "label": "100-1", "text": "第百条　この憲法は、公布の日から起算して六箇月を経過した日から、これを施行する。", "checkbox_label": "100-1:この憲法は、公布の日から起算して六箇月を経過した日から、これ"}, {"id": "100-2", "label": "100-2", "text": "２　この憲法を施行するために必要な法律の制定、参議院議員の選挙及び国会召集の手続並びにこの憲法を施行するために必要な準備手続は、前項の期日よりも前に、これを行ふことができる。", "checkbox_label": "100-2:この憲法を施行するために必要な法律の制定、参議院議員の選挙及"}, {"id": "101-0", "label": "101-0", "text": "第百一条　この憲法施行の際、参議院がまだ成立してゐないときは、その成立するまでの間、衆議院は、国会としての権限を行ふ。", "checkbox_label": "101-0:この憲法施行の際、参議院がまだ成立してゐないときは、その成立"}, {"id": "102-0", "label": "102-0", "text": "第百二条　この憲法による第一期の参議院議員のうち、その半数の者の任期は、これを三年とする。その議員は、法律の定めるところにより、これを定める。", "checkbox_label": "102-0:この憲法による第一期の参議院議員のうち、その半数の者の任期は"}, {"id": "103-0", "label": "103-0", "text": "第百三条　この憲法施行の際現に在職する国務大臣、衆議院議員及び裁判官並びにその他の公務員で、その地位に相応する地位がこの憲法で認められてゐる者は、法律で特別の定をした場合を除いては、この憲法施行のため、当然にはその地位を失ふことはない。但し、この憲法によつて、後任者が選挙又は任命されたときは、当然その地位を失ふ。", "checkbox_label": "103-0:この憲法施行の際現に在職する国務大臣、衆議院議員及び裁判官並"}];

const COLORS = [
  { name: '白',     value: '#ffffff' },
  { name: '緑',     value: '#00ff41' },
  { name: '黄',     value: '#ffe600' },
  { name: '水色',   value: '#00cfff' },
  { name: '橙',     value: '#ff8c00' },
  { name: '赤',     value: '#ff3333' },
  { name: 'ピンク', value: '#ff69b4' },
  { name: '紫',     value: '#b388ff' },
  { name: '青',     value: '#4488ff' },
  { name: 'ライム', value: '#aaff00' },
];

// --- 色ボタン生成 ---
const colorRow = document.getElementById('colorOptions');
COLORS.forEach((c, i) => {
  const label = document.createElement('label');
  label.style.background = c.value;
  label.title = c.name;
  label.innerHTML = '<input type="checkbox" name="color" value="' + c.value + '"' + (c.value === '#ffe600' ? ' checked' : '') + '>';
  colorRow.appendChild(label);
});

// --- 縦書きトグル ---
document.getElementById('verticalToggle').addEventListener('click', function() {
  const isOn = this.dataset.on === 'true';
  this.dataset.on = isOn ? 'false' : 'true';
});

// --- 条文リスト生成 ---
const listEl = document.getElementById('articleList');
ARTICLES.forEach(a => {
  const label = document.createElement('label');
  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.value = a.id;

  label.appendChild(cb);
  label.appendChild(document.createTextNode(a.checkbox_label));
  listEl.appendChild(label);
});

// --- 設定の保存・復元 ---
function saveSettings() {
  const settings = {
    size: document.querySelector('input[name="size"]:checked').value,
    speed: document.querySelector('input[name="speed"]:checked').value,
    colors: [...document.querySelectorAll('input[name="color"]:checked')].map(cb => cb.value),
    articles: [...document.querySelectorAll('#articleList input:checked')].map(cb => cb.value),
    freeMsg1: document.getElementById('freeMsg1').value,
    freeMsg2: document.getElementById('freeMsg2').value,
    vertical: document.getElementById('verticalToggle').dataset.on
  };
  localStorage.setItem('kenpou-settings', JSON.stringify(settings));
}

function restoreSettings() {
  try {
    const saved = JSON.parse(localStorage.getItem('kenpou-settings'));
    if (!saved) return;
    // 文字サイズ
    const sizeRadio = document.querySelector('input[name="size"][value="' + saved.size + '"]');
    if (sizeRadio) sizeRadio.checked = true;
    // 速度
    const speedRadio = document.querySelector('input[name="speed"][value="' + saved.speed + '"]');
    if (speedRadio) speedRadio.checked = true;
    // 色
    if (saved.colors && saved.colors.length > 0) {
      document.querySelectorAll('input[name="color"]').forEach(cb => {
        cb.checked = saved.colors.includes(cb.value);
      });
    }
    // 条文
    if (saved.articles && saved.articles.length > 0) {
      document.querySelectorAll('#articleList input').forEach(cb => {
        cb.checked = saved.articles.includes(cb.value);
      });
    }
    // メッセージ
    if (saved.freeMsg1) document.getElementById('freeMsg1').value = saved.freeMsg1;
    if (saved.freeMsg2) document.getElementById('freeMsg2').value = saved.freeMsg2;
    // 縦置き
    if (saved.vertical === 'true') {
      document.getElementById('verticalToggle').dataset.on = 'true';
    }
  } catch(e) {}
}
restoreSettings();

// --- 実行 ---
document.getElementById('btnRun').addEventListener('click', () => {
  const fontSize = parseInt(document.querySelector('input[name="size"]:checked').value);
  const speed = parseInt(document.querySelector('input[name="speed"]:checked').value);
  const colors = [...document.querySelectorAll('input[name="color"]:checked')].map(cb => cb.value);
  const vertical = document.getElementById('verticalToggle').dataset.on === 'true';
  const checked = [...document.querySelectorAll('#articleList input:checked')].map(cb => cb.value);
  const freeText1 = document.getElementById('freeMsg1').value.trim();
  const freeText2 = document.getElementById('freeMsg2').value.trim();

  if (colors.length === 0) {
    alert('色を1つ以上選択してください');
    return;
  }
  if (checked.length === 0 && freeText1 === '' && freeText2 === '') {
    alert('条文を1つ以上選択するか、メッセージ欄に入力してください');
    return;
  }

  const selected = [];
  if (freeText1 !== '') {
    selected.push({ id: 'free1', label: 'Msg1', text: freeText1, checkbox_label: '' });
  }
  if (freeText2 !== '') {
    selected.push({ id: 'free2', label: 'Msg2', text: freeText2, checkbox_label: '' });
  }
  selected.push(...ARTICLES.filter(a => checked.includes(a.id)));
  saveSettings();
  startScroll(selected, fontSize, speed, colors, vertical);
});

// --- 戻る ---
document.getElementById('btnBack').addEventListener('click', () => {
  cancelAnimationFrame(rafId);
  document.getElementById('settings').style.display = 'block';
  document.getElementById('player').style.display = 'none';
  // 縦書きモードのスタイルをリセット
  const btn = document.getElementById('btnBack');
  btn.textContent = '← 設定に戻る';
  btn.style.writingMode = '';
  btn.style.left = '';
  btn.style.right = '10px';
  btn.style.top = '10px';
  btnPause.style.left = '';
  btnPause.style.right = '130px';
  btnPause.style.top = '10px';
});

// --- スクロール ---
const runner = document.getElementById('runner');
const board = document.getElementById('board');
const boardTitle = document.getElementById('boardTitle');
let posX = 0, totalW = 0, lastTime = null, rafId = null;
let segEdges = [], currentTexts = [];
let paused = false;
let currentSegIdx = -1;

// --- 一時停止/再生トグル ---
const btnPause = document.getElementById('btnPause');
btnPause.addEventListener('click', () => {
  paused = !paused;
  btnPause.textContent = paused ? '▶' : '⏸';
  if (!paused) {
    lastTime = null;
    rafId = requestAnimationFrame(tickFn);
  }
});

function glow(c) {
  return `0 0 8px ${c}cc, 0 0 20px ${c}55`;
}

let tickFn = null;

let segColors = [];

let isVertical = false;

function startScroll(texts, fontSize, speed, colors, vertical) {
  isVertical = vertical;
  currentTexts = texts;
  paused = false;
  btnPause.textContent = '⏸';
  document.getElementById('settings').style.display = 'none';
  const playerEl = document.getElementById('player');
  playerEl.style.display = 'flex';

  // 縦書きクラスの切り替え
  playerEl.classList.toggle('vertical', isVertical);

  // サイズ設定（vmin単位）
  if (isVertical) {
    board.style.height = '100vh';
    board.style.width = (fontSize * 1.5) + 'vmin';
    board.style.transform = 'translateX(-50%)';
  } else {
    board.style.height = (fontSize * 1.3) + 'vmin';
    board.style.width = '';
    board.style.transform = '';
  }
  boardTitle.style.fontSize = Math.max(5, fontSize * 0.2) + 'vmin';
  const paddingLeft = Math.max(10, fontSize * 1.0);

  // タイトル初期表示
  boardTitle.textContent = texts[0].label;
  boardTitle.style.color = colors[0];
  boardTitle.style.textShadow = `0 0 12px ${colors[0]}88`;

  // テキスト生成 — 色を順番にサイクル割り当て
  // 1セット = texts.length × colors.length の最小公倍数分のセグメント
  // これにより色とテキストの組み合わせが1周し、2セット目で完全にループする
  runner.innerHTML = '';
  segColors = [];
  const gcd = (a, b) => b === 0 ? a : gcd(b, a % b);
  const lcm = (a, b) => a / gcd(a, b) * b;
  const setLen = lcm(texts.length, colors.length);
  currentTexts = [];
  for (let i = 0; i < setLen; i++) {
    currentTexts.push(texts[i % texts.length]);
    segColors.push(colors[i % colors.length]);
  }
  for (let set = 0; set < 2; set++) {
    for (let i = 0; i < setLen; i++) {
      const e = currentTexts[i];
      const c = segColors[i];
      const span = document.createElement('span');
      span.className = 'seg';
      span.textContent = e.text;
      span.style.color = c;
      span.style.textShadow = glow(c);
      span.style.fontSize = fontSize + 'vmin';
      if (isVertical) {
        span.style.paddingTop = paddingLeft + 'vmin';
      } else {
        span.style.paddingLeft = paddingLeft + 'vmin';
      }
      runner.appendChild(span);
    }
  }

  // 幅計測
  posX = 0;
  totalW = 0;
  lastTime = null;
  segEdges = [];
  currentSegIdx = -1;

  tickFn = function tick(ts) {
    if (paused) return;
    if (!lastTime) lastTime = ts;
    const dt = Math.min((ts - lastTime) / 1000, 0.05);
    lastTime = ts;
    if (totalW > 0) {
      posX -= speed * dt;
      if (posX <= -totalW) posX += totalW;
      if (isVertical) {
        runner.style.transform = `translateY(${posX}px)`;
      } else {
        runner.style.transform = `translateX(${posX}px)`;
      }
      const offset = -posX % totalW;
      for (let i = segEdges.length - 1; i >= 0; i--) {
        if (offset >= segEdges[i]) {
          if (i !== currentSegIdx) {
            currentSegIdx = i;
            boardTitle.textContent = currentTexts[i].label;
            const c = segColors[i];
            boardTitle.style.color = c;
            boardTitle.style.textShadow = `0 0 12px ${c}88`;
          }
          break;
        }
      }
    }
    rafId = requestAnimationFrame(tick);
  };

  // 計測・配置を関数化（resize時にも呼ぶ）
  function recalcLayout() {
    const segs = runner.querySelectorAll('.seg');
    const half = segs.length / 2;

    // transform: scaleX/Y(0.9) はレイアウト幅を変えないため
    // 視覚上の余白をネガティブマージンで補正する
    const scaleFactor = 0.9;
    for (let i = 0; i < segs.length; i++) {
      const size = isVertical ? segs[i].offsetHeight : segs[i].offsetWidth;
      const compensation = -(size * (1 - scaleFactor)) + 'px';
      if (isVertical) {
        segs[i].style.marginBottom = compensation;
      } else {
        segs[i].style.marginRight = compensation;
      }
    }

    const oldTotalW = totalW;
    totalW = 0;
    segEdges = [];
    for (let i = 0; i < half; i++) {
      segEdges.push(totalW);
      const size = isVertical ? segs[i].offsetHeight : segs[i].offsetWidth;
      const margin = parseFloat(isVertical ? segs[i].style.marginBottom : segs[i].style.marginRight) || 0;
      totalW += size + margin;
    }

    // スクロール位置を新しいtotalWに比例補正
    if (oldTotalW > 0 && totalW > 0) {
      posX = posX * (totalW / oldTotalW);
    }

    // 縦書き時：条文番号をボード右、ボタンをボード左に配置
    if (isVertical) {
      const boardRect = board.getBoundingClientRect();
      const rightOfBoard = boardRect.right + 10;
      const leftOfBoard = boardRect.left;
      boardTitle.style.left = rightOfBoard + 'px';
      boardTitle.style.top = '10px';
      const btnBack = document.getElementById('btnBack');
      btnBack.textContent = '↓ 設定に戻る';
      const gap = 10;
      const rightPos = window.innerWidth - leftOfBoard + gap;
      btnBack.style.left = '';
      btnBack.style.right = rightPos + 'px';
      btnBack.style.top = '10px';
      btnPause.style.left = '';
      btnPause.style.right = rightPos + 'px';
      const btnBackRect = btnBack.getBoundingClientRect();
      btnPause.style.top = (btnBackRect.bottom + 4) + 'px';
    } else {
      boardTitle.style.left = '';
      document.getElementById('btnBack').style.left = '';
      document.getElementById('btnBack').style.right = '10px';
      document.getElementById('btnBack').style.top = '10px';
      btnPause.style.left = '';
      btnPause.style.right = '130px';
      btnPause.style.top = '10px';
    }
  }

  // resize対応（画面回転時に再計測）
  // requestAnimationFrame を挟んでレイアウト確定後に計測する
  function safeRecalc() {
    requestAnimationFrame(function() {
      requestAnimationFrame(recalcLayout);
    });
  }
  let resizeTimer = null;
  function onResize() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(safeRecalc, 100);
  }
  function onOrientationChange() {
    // Safari向け: 回転アニメーション完了を待って段階的に再計測
    setTimeout(safeRecalc, 200);
    setTimeout(safeRecalc, 500);
    setTimeout(safeRecalc, 1000);
  }
  window.removeEventListener('resize', onResize);
  window.addEventListener('resize', onResize);
  window.removeEventListener('orientationchange', onOrientationChange);
  window.addEventListener('orientationchange', onOrientationChange);

  document.fonts.ready.then(() => {
    recalcLayout();
    rafId = requestAnimationFrame(tickFn);
  });
}

/* ===== PWA インストールバナー ===== */
(function() {
  const banner = document.getElementById('installBanner');
  const btnInstall = document.getElementById('installBtn');
  const btnClose = document.getElementById('installClose');

  // PWAとして起動中（standalone）なら表示しない
  if (window.matchMedia('(display-mode: standalone)').matches || navigator.standalone) return;
  // ユーザーが閉じた場合は24時間非表示
  const dismissed = localStorage.getItem('installBannerDismissed');
  if (dismissed && Date.now() - Number(dismissed) < 86400000) return;

  let deferredPrompt = null;

  // Chrome/Edge: beforeinstallprompt でネイティブインストールダイアログを呼べる
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    deferredPrompt = e;
    banner.style.display = 'flex';
  });

  // iOS Safari 等: beforeinstallprompt が発火しない場合は手順案内として表示
  // 少し遅延してから表示（beforeinstallprompt がなければ案内モード）
  setTimeout(function() {
    if (!deferredPrompt && !window.matchMedia('(display-mode: standalone)').matches) {
      // iOS判定
      var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      if (isIOS) {
        btnInstall.textContent = '手順を見る';
        btnInstall.dataset.ios = '1';
      }
      banner.style.display = 'flex';
    }
  }, 2000);

  btnInstall.addEventListener('click', function() {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function() { banner.style.display = 'none'; });
      deferredPrompt = null;
    } else if (btnInstall.dataset.ios === '1') {
      alert('Safari の共有ボタン（□↑）をタップし、\n「ホーム画面に追加」を選択してください。');
    } else {
      alert('ブラウザのメニューから\n「アプリをインストール」を選択してください。');
    }
  });

  btnClose.addEventListener('click', function() {
    banner.style.display = 'none';
    localStorage.setItem('installBannerDismissed', String(Date.now()));
  });

  // インストール完了時に非表示
  window.addEventListener('appinstalled', function() {
    banner.style.display = 'none';
  });
})();
</script>
